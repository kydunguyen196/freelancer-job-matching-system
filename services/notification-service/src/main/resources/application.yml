server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: notification-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jpa:
    hibernate:
      ddl-auto: ${APP_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${APP_FLYWAY_BASELINE_ON_MIGRATE:true}

logging:
  pattern:
    level: "%5p [cid:%X{correlationId:-}]"
  level:
    org.hibernate.SQL: ${APP_SQL_LOG_LEVEL:debug}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-to-at-least-32-characters-long-for-dev}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  email:
    enabled: ${ENABLE_EMAIL:false}
    sendgrid-api-key: ${SENDGRID_API_KEY:}
    from-email: ${MAIL_FROM_EMAIL:}
    from-name: ${MAIL_FROM_NAME:SkillBridge}
    sendgrid-base-url: ${SENDGRID_BASE_URL:https://api.sendgrid.com}
    max-attempts: ${EMAIL_MAX_ATTEMPTS:5}
    initial-retry-delay-seconds: ${EMAIL_INITIAL_RETRY_DELAY_SECONDS:60}
    retry-multiplier: ${EMAIL_RETRY_MULTIPLIER:2.0}
    retry-poll-delay-ms: ${EMAIL_RETRY_POLL_DELAY_MS:60000}
  internal:
    api-key: ${APP_INTERNAL_API_KEY:change-this-contract-internal-api-key}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${APP_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${APP_DOCS_ENABLED:true}
