server:
  port: 8084

spring:
  application:
    name: proposal-service
  servlet:
    multipart:
      max-file-size: ${MAX_CV_FILE_SIZE_MB:10}MB
      max-request-size: ${MAX_CV_FILE_SIZE_MB:10}MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/proposal_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  pattern:
    level: "%5p [cid:%X{correlationId:-}]"
  level:
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-to-at-least-32-characters-long-for-dev}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  services:
    job-base-url: ${APP_SERVICES_JOB_BASE_URL:http://localhost:8083}
    contract-base-url: ${APP_SERVICES_CONTRACT_BASE_URL:http://localhost:8085}
    notification-base-url: ${APP_SERVICES_NOTIFICATION_BASE_URL:http://localhost:8086}
  calendar:
    google:
      enabled: ${ENABLE_CALENDAR:false}
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}
      calendar-id: ${GOOGLE_CALENDAR_ID:}
      scopes: ${GOOGLE_SCOPES:https://www.googleapis.com/auth/calendar}
      refresh-token: ${GOOGLE_REFRESH_TOKEN:}
      token-url: ${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
      api-base-url: ${GOOGLE_API_BASE_URL:https://www.googleapis.com}
  file-storage:
    enabled: ${ENABLE_FILE_STORAGE:false}
    provider: ${STORAGE_PROVIDER:mock}
    max-cv-file-size-mb: ${MAX_CV_FILE_SIZE_MB:10}
    allowed-cv-content-types: ${ALLOWED_CV_CONTENT_TYPES:application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
    mock:
      base-dir: ${MOCK_STORAGE_BASE_DIR:${java.io.tmpdir}/skillbridge/mock-storage}
      bucket: ${MOCK_STORAGE_BUCKET:mock-local}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${AWS_REGION:}
      access-key-id: ${AWS_ACCESS_KEY_ID:}
      secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    minio:
      endpoint: ${MINIO_ENDPOINT:}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:}
      region: ${MINIO_REGION:us-east-1}
      secure: ${MINIO_SECURE:false}
  internal:
    api-key: ${APP_INTERNAL_API_KEY:change-this-contract-internal-api-key}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
