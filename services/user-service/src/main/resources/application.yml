server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: user-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: ${APP_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${APP_FLYWAY_BASELINE_ON_MIGRATE:true}

logging:
  pattern:
    level: "%5p [cid:%X{correlationId:-}]"
  level:
    org.hibernate.SQL: ${APP_SQL_LOG_LEVEL:debug}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-to-at-least-32-characters-long-for-dev}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  media:
    max-file-size-mb: ${APP_MEDIA_MAX_FILE_SIZE_MB:3}
    allowed-content-types: ${APP_MEDIA_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${APP_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${APP_DOCS_ENABLED:true}
