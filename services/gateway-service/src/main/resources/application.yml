server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: gateway-service
  lifecycle:
    timeout-per-shutdown-phase: 20s

  codec:
    max-in-memory-size: 10MB

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/users/**

        - id: proposal-service-by-job
          uri: ${PROPOSAL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/jobs/*/proposals

        - id: job-service
          uri: ${JOB_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/jobs/**

        - id: proposal-service
          uri: ${PROPOSAL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/proposals/**

        - id: contract-service
          uri: ${CONTRACT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/contracts/**

        - id: contract-service-milestones
          uri: ${CONTRACT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/milestones/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/notifications/**

        - id: auth-service-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - SetPath=/v3/api-docs

        - id: user-service-docs
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - SetPath=/v3/api-docs

        - id: job-service-docs
          uri: ${JOB_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/job-service
          filters:
            - SetPath=/v3/api-docs

        - id: proposal-service-docs
          uri: ${PROPOSAL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v3/api-docs/proposal-service
          filters:
            - SetPath=/v3/api-docs

        - id: contract-service-docs
          uri: ${CONTRACT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/v3/api-docs/contract-service
          filters:
            - SetPath=/v3/api-docs

        - id: notification-service-docs
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - SetPath=/v3/api-docs

logging:
  pattern:
    level: "%5p [cid:%X{correlationId:-}]"
  level:
    org.springframework.cloud.gateway: ${APP_GATEWAY_LOG_LEVEL:info}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${APP_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${APP_DOCS_ENABLED:true}
    disable-swagger-default-url: true
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: user-service
        url: /v3/api-docs/user-service
      - name: job-service
        url: /v3/api-docs/job-service
      - name: proposal-service
        url: /v3/api-docs/proposal-service
      - name: contract-service
        url: /v3/api-docs/contract-service
      - name: notification-service
        url: /v3/api-docs/notification-service

app:
  auth:
    cookie:
      access-name: ${APP_AUTH_COOKIE_ACCESS_NAME:sb_access_token}
  rate-limit:
    auth:
      enabled: ${APP_AUTH_RATE_LIMIT_ENABLED:true}
      trust-forwarded-for: ${APP_AUTH_RATE_LIMIT_TRUST_FORWARDED_FOR:true}
      window-seconds: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      login-max-requests: ${APP_AUTH_LOGIN_MAX_REQUESTS:10}
      register-max-requests: ${APP_AUTH_REGISTER_MAX_REQUESTS:5}
      refresh-max-requests: ${APP_AUTH_REFRESH_MAX_REQUESTS:20}
  security:
    hsts:
      enabled: ${APP_SECURITY_HSTS_ENABLED:false}
      max-age-seconds: ${APP_SECURITY_HSTS_MAX_AGE_SECONDS:31536000}
