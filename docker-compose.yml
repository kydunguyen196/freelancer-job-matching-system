services:
  postgres:
    image: postgres:16
    container_name: skillbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql:ro

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: skillbridge-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: skillbridge-opensearch
    restart: unless-stopped
    profiles: ["search"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9200'"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: skillbridge-minio
    restart: unless-stopped
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: skillbridge-minio-init
    profiles: ["storage"]
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set skillbridge http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done &&
      mc mb -p skillbridge/${MINIO_BUCKET:-skillbridge-cv} || true &&
      mc anonymous set none skillbridge/${MINIO_BUCKET:-skillbridge-cv} || true
      "
    restart: "no"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: skillbridge-auth-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters-long-for-dev}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_JPA_DDL_AUTO: ${APP_JPA_DDL_AUTO:-update}
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_SQL_LOG_LEVEL: ${APP_SQL_LOG_LEVEL:-debug}
      APP_MEDIA_MAX_FILE_SIZE_MB: ${APP_MEDIA_MAX_FILE_SIZE_MB:-3}
      APP_MEDIA_ALLOWED_CONTENT_TYPES: ${APP_MEDIA_ALLOWED_CONTENT_TYPES:-image/jpeg,image/png,image/webp,image/gif}
      APP_SECURITY_LOG_LEVEL: ${APP_SECURITY_LOG_LEVEL:-info}
      APP_AUTH_COOKIE_ACCESS_NAME: ${APP_AUTH_COOKIE_ACCESS_NAME:-sb_access_token}
      APP_AUTH_COOKIE_REFRESH_NAME: ${APP_AUTH_COOKIE_REFRESH_NAME:-sb_refresh_token}
      APP_AUTH_COOKIE_SECURE: ${APP_AUTH_COOKIE_SECURE:-false}
      APP_AUTH_COOKIE_SAME_SITE: ${APP_AUTH_COOKIE_SAME_SITE:-Lax}
      APP_AUTH_COOKIE_DOMAIN: ${APP_AUTH_COOKIE_DOMAIN:-}
      APP_AUTH_COOKIE_ACCESS_PATH: ${APP_AUTH_COOKIE_ACCESS_PATH:-/}
      APP_AUTH_COOKIE_REFRESH_PATH: ${APP_AUTH_COOKIE_REFRESH_PATH:-/auth}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: skillbridge-user-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters-long-for-dev}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_JPA_DDL_AUTO: ${APP_JPA_DDL_AUTO:-update}
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_SQL_LOG_LEVEL: ${APP_SQL_LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: skillbridge-notification-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/notification_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters-long-for-dev}
      APP_INTERNAL_API_KEY: ${APP_INTERNAL_API_KEY:-change-this-contract-internal-api-key}
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SkillBridge}
      SENDGRID_BASE_URL: ${SENDGRID_BASE_URL:-https://api.sendgrid.com}
      EMAIL_MAX_ATTEMPTS: ${EMAIL_MAX_ATTEMPTS:-5}
      EMAIL_INITIAL_RETRY_DELAY_SECONDS: ${EMAIL_INITIAL_RETRY_DELAY_SECONDS:-60}
      EMAIL_RETRY_MULTIPLIER: ${EMAIL_RETRY_MULTIPLIER:-2.0}
      EMAIL_RETRY_POLL_DELAY_MS: ${EMAIL_RETRY_POLL_DELAY_MS:-60000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_JPA_DDL_AUTO: ${APP_JPA_DDL_AUTO:-update}
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_SQL_LOG_LEVEL: ${APP_SQL_LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8086:8086"

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    container_name: skillbridge-job-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/job_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters-long-for-dev}
      APP_INTERNAL_API_KEY: ${APP_INTERNAL_API_KEY:-change-this-contract-internal-api-key}
      APP_SERVICES_NOTIFICATION_BASE_URL: http://notification-service:8086
      APP_SERVICES_PROPOSAL_BASE_URL: ${APP_SERVICES_PROPOSAL_BASE_URL:-http://proposal-service:8084}
      APP_SERVICES_CONTRACT_BASE_URL: ${APP_SERVICES_CONTRACT_BASE_URL:-http://contract-service:8085}
      ENABLE_ADVANCED_SEARCH: ${ENABLE_ADVANCED_SEARCH:-false}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-db}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      OPENSEARCH_INDEX_JOBS: ${OPENSEARCH_INDEX_JOBS:-jobs}
      OPENSEARCH_INDEX_COMPANIES: ${OPENSEARCH_INDEX_COMPANIES:-companies}
      OPENSEARCH_CONNECT_TIMEOUT_MS: ${OPENSEARCH_CONNECT_TIMEOUT_MS:-3000}
      OPENSEARCH_SOCKET_TIMEOUT_MS: ${OPENSEARCH_SOCKET_TIMEOUT_MS:-5000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_JPA_DDL_AUTO: ${APP_JPA_DDL_AUTO:-update}
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_SQL_LOG_LEVEL: ${APP_SQL_LOG_LEVEL:-debug}
      APP_OUTBOX_ENABLED: ${APP_OUTBOX_ENABLED:-true}
      APP_OUTBOX_BATCH_SIZE: ${APP_OUTBOX_BATCH_SIZE:-50}
      APP_OUTBOX_DISPATCH_INTERVAL_MS: ${APP_OUTBOX_DISPATCH_INTERVAL_MS:-5000}
      APP_OUTBOX_INITIAL_RETRY_DELAY_SECONDS: ${APP_OUTBOX_INITIAL_RETRY_DELAY_SECONDS:-5}
      APP_OUTBOX_RETRY_MULTIPLIER: ${APP_OUTBOX_RETRY_MULTIPLIER:-2.0}
      APP_OUTBOX_MAX_RETRY_DELAY_SECONDS: ${APP_OUTBOX_MAX_RETRY_DELAY_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
    ports:
      - "8083:8083"

  contract-service:
    build:
      context: .
      dockerfile: services/contract-service/Dockerfile
    container_name: skillbridge-contract-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/contract_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters-long-for-dev}
      APP_INTERNAL_API_KEY: ${APP_INTERNAL_API_KEY:-change-this-contract-internal-api-key}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_JPA_DDL_AUTO: ${APP_JPA_DDL_AUTO:-update}
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_SQL_LOG_LEVEL: ${APP_SQL_LOG_LEVEL:-debug}
      APP_OUTBOX_ENABLED: ${APP_OUTBOX_ENABLED:-true}
      APP_OUTBOX_BATCH_SIZE: ${APP_OUTBOX_BATCH_SIZE:-50}
      APP_OUTBOX_DISPATCH_INTERVAL_MS: ${APP_OUTBOX_DISPATCH_INTERVAL_MS:-5000}
      APP_OUTBOX_INITIAL_RETRY_DELAY_SECONDS: ${APP_OUTBOX_INITIAL_RETRY_DELAY_SECONDS:-5}
      APP_OUTBOX_RETRY_MULTIPLIER: ${APP_OUTBOX_RETRY_MULTIPLIER:-2.0}
      APP_OUTBOX_MAX_RETRY_DELAY_SECONDS: ${APP_OUTBOX_MAX_RETRY_DELAY_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8085:8085"

  proposal-service:
    build:
      context: .
      dockerfile: services/proposal-service/Dockerfile
    container_name: skillbridge-proposal-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/proposal_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters-long-for-dev}
      APP_SERVICES_JOB_BASE_URL: http://job-service:8083
      APP_SERVICES_CONTRACT_BASE_URL: http://contract-service:8085
      APP_SERVICES_NOTIFICATION_BASE_URL: http://notification-service:8086
      APP_INTERNAL_API_KEY: ${APP_INTERNAL_API_KEY:-change-this-contract-internal-api-key}
      ENABLE_FILE_STORAGE: ${ENABLE_FILE_STORAGE:-true}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-mock}
      MAX_CV_FILE_SIZE_MB: ${MAX_CV_FILE_SIZE_MB:-10}
      CV_SIGNED_URL_TTL_MINUTES: ${CV_SIGNED_URL_TTL_MINUTES:-15}
      ALLOWED_CV_CONTENT_TYPES: ${ALLOWED_CV_CONTENT_TYPES:-application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
      MOCK_STORAGE_BASE_DIR: ${MOCK_STORAGE_BASE_DIR:-}
      MOCK_STORAGE_BUCKET: ${MOCK_STORAGE_BUCKET:-mock-local}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-skillbridge-cv}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      ENABLE_CALENDAR: ${ENABLE_CALENDAR:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/oauth2/callback/google}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_SCOPES: ${GOOGLE_SCOPES:-https://www.googleapis.com/auth/calendar}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_TOKEN_URL: ${GOOGLE_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GOOGLE_API_BASE_URL: ${GOOGLE_API_BASE_URL:-https://www.googleapis.com}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_JPA_DDL_AUTO: ${APP_JPA_DDL_AUTO:-update}
      APP_FLYWAY_ENABLED: ${APP_FLYWAY_ENABLED:-true}
      APP_FLYWAY_BASELINE_ON_MIGRATE: ${APP_FLYWAY_BASELINE_ON_MIGRATE:-true}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_SQL_LOG_LEVEL: ${APP_SQL_LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      job-service:
        condition: service_started
      contract-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8084:8084"

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: skillbridge-gateway-service
    restart: unless-stopped
    environment:
      APP_CORS_ALLOWED_ORIGIN: ${APP_CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      JOB_SERVICE_URL: http://job-service:8083
      PROPOSAL_SERVICE_URL: http://proposal-service:8084
      CONTRACT_SERVICE_URL: http://contract-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      APP_GATEWAY_LOG_LEVEL: ${APP_GATEWAY_LOG_LEVEL:-info}
      APP_AUTH_RATE_LIMIT_ENABLED: ${APP_AUTH_RATE_LIMIT_ENABLED:-true}
      APP_AUTH_RATE_LIMIT_TRUST_FORWARDED_FOR: ${APP_AUTH_RATE_LIMIT_TRUST_FORWARDED_FOR:-true}
      APP_AUTH_RATE_LIMIT_WINDOW_SECONDS: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      APP_AUTH_LOGIN_MAX_REQUESTS: ${APP_AUTH_LOGIN_MAX_REQUESTS:-10}
      APP_AUTH_REGISTER_MAX_REQUESTS: ${APP_AUTH_REGISTER_MAX_REQUESTS:-5}
      APP_AUTH_REFRESH_MAX_REQUESTS: ${APP_AUTH_REFRESH_MAX_REQUESTS:-20}
      APP_SECURITY_HSTS_ENABLED: ${APP_SECURITY_HSTS_ENABLED:-false}
      APP_SECURITY_HSTS_MAX_AGE_SECONDS: ${APP_SECURITY_HSTS_MAX_AGE_SECONDS:-31536000}
      APP_AUTH_COOKIE_ACCESS_NAME: ${APP_AUTH_COOKIE_ACCESS_NAME:-sb_access_token}
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      job-service:
        condition: service_started
      proposal-service:
        condition: service_started
      contract-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  pgdata:
  opensearch-data:
  minio-data:
